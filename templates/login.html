<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURAS - Automated University Result Analysis</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="manifest" href="/static/manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 90%;
            max-width: 400px;
            border: none;
            border-radius: 16px;
        }
        .brand-logo {
            height: 60px;
            margin-bottom: 15px;
        }
        .form-control {
            padding: 12px;
            border-radius: 8px;
        }
        .btn-login {
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="card login-card shadow-lg p-4">
        <div class="text-center">
            <img src="/static/logo.png" alt="AURAS Logo" class="brand-logo">
            <h3 class="fw-bold">AURAS</h3>
            <p class="text-muted">Result Analysis Portal</p>
        </div>

        <form action="/login" method="POST" class="mt-3">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" id="showPass" onclick="togglePassword()">
                    <label class="form-check-label small text-muted" for="showPass">
                        Show Password
                    </label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100 mt-2">Login</button>
        </form>

        <div class="mt-4 p-3 bg-light rounded text-center" style="font-size: 0.85rem;">
            <span class="text-secondary">Default Credentials:</span><br>
            <strong>admin</strong> / <strong>password123</strong>
        </div>
    </div>

    <script>
        function togglePassword() {
            var x = document.getElementById("password");
            if (x.type === "password") {
                x.type = "text";
            } else {
                x.type = "password";
            }
        }
    </script>
</body>
</html>
