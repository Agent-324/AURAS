<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Class - AURAS</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link rel="manifest" href="/static/manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .brand-logo {
            height: 60px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container card shadow p-4" style="max-width: 400px; border-radius: 15px;">
        
        <div class="text-center mb-4">
            <img src="/static/logo.png" alt="AURAS Logo" class="brand-logo">
            <h3 class="fw-bold mb-0">Class Selection</h3>
        </div>

        <form action="/select_class" method="POST">
            <label class="form-label fw-bold">Joining Year</label>
            <select name="year" class="form-select mb-3" required>
                {% for y in years %}<option value="{{ y }}">{{ y }}</option>{% endfor %}
            </select>
            
            <label class="form-label fw-bold">Department</label>
            <select name="dept" class="form-select mb-4" required>
                {% for d in depts %}<option value="{{ d }}">{{ d }}</option>{% endfor %}
            </select>
            
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Open Database</button>
        </form>
    </div>
</body>
</html>
